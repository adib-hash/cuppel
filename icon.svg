<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <defs>
    <radialGradient id="g1" cx="25%" cy="25%" r="60%">
      <stop offset="0%" stop-color="#E8B86D" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#E8B86D" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g2" cx="75%" cy="75%" r="60%">
      <stop offset="0%" stop-color="#E88A8A" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#E88A8A" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="192" height="192" rx="42" fill="#13161E"/>
  <!-- Ambient glows -->
  <rect width="192" height="192" rx="42" fill="url(#g1)"/>
  <rect width="192" height="192" rx="42" fill="url(#g2)"/>
  <!-- Two interlocking circles — the Cuppel mark -->
  <circle cx="80" cy="96" r="34" fill="none" stroke="#E8B86D" stroke-width="7" opacity="0.92"/>
  <circle cx="112" cy="96" r="34" fill="none" stroke="#E88A8A" stroke-width="7" opacity="0.80"/>
</svg>
